alias eae "exec autoexec"

// KEYBOARD
	// NUMERIC
		bind "1" "slot1"
		bind "2" "slot2"
		bind "3" "slot3"
		bind "4" "slot4"
        bind "5" "slot5"
        bind "8" "invnext"
        bind "9" "invprev"

    // MOVEMENT
        bind "w" "+forward;colors"
        bind "a" "+left;colors"
        bind "s" "+back;colors"
        bind "d" "+right;colors"

        bind "space" "+jump_"
        bind "ctrl" "+duck;colors"
        bind "shift" "+sprint;colors"

        bind "mwheelup" ""
        bind "mwheeldown" "+jump_"

    // ARROWS
        bind "leftarrow" "+turnleft"
		bind "rightarrow" "+turnright"

// ALIAS

    // JUMP MODE TOGGLE (F5)
        // workshop mode: white hud (color 1) + frozen | workaround mode: rainbow
        alias noop ""
        alias jump_ws "bind space +jump;bind mwheeldown +jump;alias jump_toggle jump_wa;cl_hud_color 1;alias colors noop"
        alias jump_wa "bind space +jump_;bind mwheeldown +jump_;alias jump_toggle jump_ws;cl_hud_color 4;alias colors colors4"
        alias jump_toggle "jump_ws"
        bind "F5" "jump_toggle"

    // desubtick 2025.05.06
        alias +jump_ "exec workaround_jump_start"
        alias -jump_ "exec workaround_jump_end"

    // RAINBOW HUD
        alias colors "colors4"
        alias colors4 "cl_hud_color 4; alias colors colors5"
        alias colors5 "cl_hud_color 5; alias colors colors6"
        alias colors6 "cl_hud_color 6; alias colors colors7"
        alias colors7 "cl_hud_color 7; alias colors colors8"
        alias colors8 "cl_hud_color 8; alias colors colors9"
        alias colors9 "cl_hud_color 9; alias colors colors10"
        alias colors10 "cl_hud_color 10; alias colors colors4"

// OTHER
    // VIEWMODEL
        viewmodel_fov "68"
		viewmodel_offset_x "-2.000000"
		viewmodel_offset_y "2.0"
		viewmodel_offset_z "-2.000000"
		viewmodel_presetpos "0"

    // MINIMAP
        cl_radar_always_centered "0"
        cl_radar_scale "0.75"
        cl_radar_icon_scale_min "0.4"
